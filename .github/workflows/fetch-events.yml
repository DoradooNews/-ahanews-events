name: Fetch Eventfrog Events

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,18 * * *"

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Requests installieren
        run: pip install requests

      - name: Events holen
        env:
          EVENTFROG_API_KEY: ${{ secrets.EVENTFROG_API_KEY }}
        run: python fetch_events.py

      - name: events.json speichern
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add events.json
          git commit -m "Update events.json" || echo "Keine Änderungen"
          git push
